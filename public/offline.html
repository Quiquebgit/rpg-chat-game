<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexión — Grand Line RPG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #e8e0d0;
        font-family: 'Inter', system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 2rem;
        opacity: 0.7;
      }
      h1 {
        font-family: 'Cinzel', serif;
        font-size: 1.5rem;
        color: #f59e0b;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1rem;
        color: #a0998c;
        max-width: 320px;
        line-height: 1.5;
      }
      .retry {
        margin-top: 2rem;
        padding: 0.75rem 2rem;
        background: #f59e0b;
        color: #0a0a0a;
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
      }
      .retry:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 46" fill="none">
      <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
    </svg>
    <h1>Sin conexion</h1>
    <p>Vuelve cuando tengas internet para navegar por la Grand Line.</p>
    <button class="retry" onclick="location.reload()">Reintentar</button>
  </body>
</html>
